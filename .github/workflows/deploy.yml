name: Deploy Stackwerkhaus

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /home/tarik/apps/stackwerkhaus
            GIT_SSH_COMMAND="ssh -i ~/.ssh/github_stackwerkhaus -o IdentitiesOnly=yes" git fetch origin
            git reset --hard origin/main
            docker build -t stackwerkhaus-next:latest .
            docker rm -f stackwerkhaus-next || true
            docker run -d \
              --name stackwerkhaus-next \
              --restart unless-stopped \
              --network proxy-net \
              -p 3001:3000 \
              stackwerkhaus-next:latest
          '
